<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dimentria HUD (MVP)</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font-family: Inter, system-ui, sans-serif; background:#020617; color:#e2e8f0; }
      #app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
      #sidebar { padding: 14px; overflow:auto; border-right:1px solid #1e293b; background:#0b1220; }
      #mapWrap { position:relative; background:#020617; }
      #mapSvg { width:100%; height:100%; display:block; }
      .card { background:#111827; border:1px solid #1f2937; border-radius:10px; padding:10px; margin-bottom:10px; }
      label { display:block; margin:6px 0 2px; font-size:12px; color:#93c5fd; }
      input, select, button { width:100%; padding:8px; border-radius:8px; border:1px solid #334155; background:#0f172a; color:#e2e8f0; }
      button { cursor:pointer; background:#1d4ed8; border:none; margin-top:8px; }
      .legend { position:absolute; right:16px; bottom:16px; background:#111827e8; border:1px solid #334155; border-radius:8px; padding:8px; width:200px; }
      .scale { height:8px; border-radius:999px; background: linear-gradient(90deg,#7f1d1d,#b45309,#eab308,#16a34a); margin:6px 0; }
      .scale.delta { background: linear-gradient(90deg,#7f1d1d,#dc2626,#64748b,#16a34a,#065f46); }
      .mini { font-size:11px; color:#94a3b8; }
      .chips { display:flex; gap:4px; flex-wrap:wrap; }
      .chip { font-size:11px; background:#1e293b; border:1px solid #334155; border-radius:999px; padding:2px 6px; }
      pre { margin:0; white-space: pre-wrap; font-size:11px; }
    </style>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <h3 style="margin:0 0 8px;">Dimentria</h3>
        <div class="card">
          <label>Primary Layer</label>
          <select id="layerSel">
            <option value="rrfi">RRFI</option>
            <option value="water">Water</option>
            <option value="food">Food</option>
            <option value="debt">Debt Discipline</option>
            <option value="military">Military</option>
            <option value="geography">Geography/Chokepoint</option>
          </select>
          <label>View Mode</label>
          <select id="modeSel">
            <option value="baseline">Baseline</option>
            <option value="scenario">Scenario Delta</option>
          </select>
        </div>

        <div class="card">
          <div class="chips"><span class="chip">Dalio stage</span><span class="chip" id="stageOut">5</span></div>
          <input id="stage" type="range" min="1" max="7" value="5" />
          <div class="chips"><span class="chip">Shock</span><span class="chip" id="shockOut">0.5</span></div>
          <input id="shock" type="range" min="0" max="1" step="0.1" value="0.5" />
          <div class="chips"><span class="chip">Chokepoint closure</span><span class="chip" id="chokeOut">0.0</span></div>
          <input id="choke" type="range" min="0" max="1" step="0.1" value="0" />
          <div class="chips"><span class="chip">Solar severity</span><span class="chip" id="solarOut">0.0</span></div>
          <input id="solar" type="range" min="0" max="1" step="0.1" value="0" />
          <button id="refresh">Refresh map</button>
        </div>

        <div class="card">
          <strong>Selection</strong>
          <pre id="selection">Click a country for drilldown.</pre>
        </div>

        <div class="card">
          <strong>Nowcast</strong>
          <pre id="nowcast">Loading…</pre>
        </div>
      </aside>

      <main id="mapWrap">
        <svg id="mapSvg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet"></svg>
        <div class="legend">
          <div id="legendTitle">RRFI baseline</div>
          <div id="legendScale" class="scale"></div>
          <div class="mini" id="legendRange">0 → 100</div>
        </div>
      </main>
    </div>

    <script>
      const svg = document.getElementById('mapSvg');
      const selection = document.getElementById('selection');
      const controls = ['stage','shock','choke','solar'];
      controls.forEach(id => document.getElementById(id).addEventListener('input', () => {
        document.getElementById(id + 'Out').textContent = document.getElementById(id).value;
      }));

      function project([lon, lat]) {
        const x = ((lon + 180) / 360) * 1200;
        const y = ((90 - lat) / 180) * 600;
        return [x, y];
      }

      function colorForValue(value, mode) {
        const t = Math.max(0, Math.min(1, (value + (mode === 'scenario' ? 30 : 0)) / (mode === 'scenario' ? 60 : 100)));
        if (mode === 'scenario') {
          if (value < -10) return '#7f1d1d';
          if (value < -2) return '#dc2626';
          if (value < 2) return '#475569';
          if (value < 10) return '#16a34a';
          return '#065f46';
        }
        if (t < 0.25) return '#7f1d1d';
        if (t < 0.5) return '#b45309';
        if (t < 0.75) return '#eab308';
        return '#16a34a';
      }

      function renderMap(features, mode) {
        svg.innerHTML = '<rect x="0" y="0" width="1200" height="600" fill="#020617" />';
        features.forEach((f) => {
          const coords = f.geometry.coordinates[0].map(project);
          const d = `M ${coords.map(([x,y]) => `${x.toFixed(1)} ${y.toFixed(1)}`).join(' L ')} Z`;
          const value = mode === 'scenario' ? f.properties.delta : f.properties.value;
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', d);
          path.setAttribute('fill', colorForValue(value ?? 0, mode));
          path.setAttribute('stroke', '#0f172a');
          path.setAttribute('stroke-width', '2');
          path.addEventListener('mouseenter', () => {
            selection.textContent = `${f.properties.name} (${f.properties.iso3})\n${mode === 'scenario' ? `Delta: ${f.properties.delta}` : `Value: ${f.properties.value}`}\nTop driver: ${f.properties.top_driver}`;
          });
          path.addEventListener('click', async () => {
            const res = await fetch(`/v1/country/${f.properties.iso3}/summary`);
            const data = await res.json();
            selection.textContent = JSON.stringify({
              country: data.name,
              rrfi: data.rrfi.final_score,
              top_drivers: data.top_drivers,
              warnings: data.warnings
            }, null, 2);
          });
          svg.appendChild(path);
        });
      }

      async function refreshLayer() {
        const layer_id = document.getElementById('layerSel').value;
        const mode = document.getElementById('modeSel').value;
        const params = new URLSearchParams({
          layer_id,
          mode,
          dalio_stage: document.getElementById('stage').value,
          shock_severity: document.getElementById('shock').value,
          chokepoint_closure: document.getElementById('choke').value,
          solar_storm_severity: document.getElementById('solar').value
        });
        const res = await fetch(`/v1/world/layer-view?${params.toString()}`);
        const data = await res.json();
        renderMap(data.feature_collection.features, mode);
        document.getElementById('legendTitle').textContent = `${layer_id.toUpperCase()} ${mode}`;
        document.getElementById('legendScale').className = mode === 'scenario' ? 'scale delta' : 'scale';
        document.getElementById('legendRange').textContent = mode === 'scenario' ? '-30 → +30 delta' : '0 → 100 score';
      }

      async function loadNowcast() {
        const res = await fetch('/v1/nowcast');
        const data = await res.json();
        document.getElementById('nowcast').textContent = JSON.stringify(data.state, null, 2);
      }

      document.getElementById('refresh').addEventListener('click', refreshLayer);
      document.getElementById('modeSel').addEventListener('change', refreshLayer);
      document.getElementById('layerSel').addEventListener('change', refreshLayer);

      loadNowcast();
      refreshLayer();
    </script>
  </body>
</html>
